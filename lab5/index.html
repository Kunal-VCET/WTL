<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-container">

    <h1>JavaScript Quiz</h1>

    <div id="quiz">
        <h2 id="question"></h2>

        <div class="options">
            <button class="option" id="opt0" onclick="checkAnswer(0)"></button>
            <button class="option" id="opt1" onclick="checkAnswer(1)"></button>
            <button class="option" id="opt2" onclick="checkAnswer(2)"></button>
            <button class="option" id="opt3" onclick="checkAnswer(3)"></button>
        </div>

        <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="result" class="hidden">
        <h2>Your Final Score</h2>
        <h1 id="score"></h1>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
